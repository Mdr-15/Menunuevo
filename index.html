<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Space Wings — Experiencia Menú Digital</title>
    
    <!-- Tipografías de Vanguardia -->
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">

    <style>
    /* --- VARIABLES DE ALTA CLARIDAD VISUAL --- */
    :root {
        --bg-cosmico: #f6f8fa;      /* Fondo de porcelana ultra-suave que descansa la vista */
        --bg-surface: #ffffff;      /* Blanco puro para paneles de control */
        --glass-bg: rgba(255, 255, 255, 0.7); /* Cristal esmerilado claro y translúcido */
        --glass-border: rgba(9, 13, 22, 0.06); /* Borde sutil de contención */
        --glass-border-glow: rgba(179, 107, 40, 0.2); 
        
        /* Paleta Cromática "Canela Tostada" */
        --brand-accent: #b36b28;     /* Canela de autor elegante de alto contraste */
        --brand-glow: rgba(179, 107, 40, 0.08);
        --text-gold: #475569;       /* Gris pizarra suave para subtítulos secundarios */
        --text-white: #0f172a;      /* Negro tinta profundo (Slate 900) para máxima lectura */
        --text-muted: #64748b;      /* Gris acero intermedio */
        
        /* Estado del Sistema */
        --success: #0eb87f;
        --error-vibrant: #dc2626;
        --error-dim: #fef2f2;
        
        /* Radios Orgánicos (Squircle Shapes) */
        --radius-card: 24px;
        --radius-interactive: 14px;
        --radius-pill: 100px;
        
        /* Ingeniería de Sombras Orgánicas Blandas */
        --shadow-nebula: 0 10px 30px -10px rgba(9, 13, 22, 0.05), 0 1px 3px rgba(9, 13, 22, 0.02);
        --shadow-glow: 0 4px 12px rgba(179, 107, 40, 0.15);
        --transition-fluid: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }

    /* --- LIENZO DEL SISTEMA --- */
    body {
        background-color: var(--bg-cosmico);
        color: var(--text-white);
        font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
        margin: 0;
        display: flex;
        min-height: 100vh;
        -webkit-font-smoothing: antialiased;
        overflow-x: hidden;
        /* Suaves destellos de luz cálida de fondo */
        background-image: 
            radial-gradient(circle at 10% 20%, rgba(179, 107, 40, 0.03) 0%, transparent 40%),
            radial-gradient(circle at 90% 80%, rgba(179, 107, 40, 0.02) 0%, transparent 50%);
        background-attachment: fixed;
    }

    #pantalla-tienda {
        display: flex;
        width: 100%;
    }

    main {
        flex: 1;
        padding: 70px 60px;
        box-sizing: border-box;
        max-width: 1280px;
        margin: 0 auto;
    }

    /* --- MARCA E IDENTIDAD VISUAL --- */
    h1.logo {
        font-family: 'Space Grotesk', sans-serif;
        font-size: 4rem;
        text-transform: uppercase;
        text-align: center;
        margin-bottom: 60px;
        font-weight: 700;
        letter-spacing: -2px;
        background: linear-gradient(135deg, var(--text-white) 30%, var(--brand-accent) 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
    }

    h2.seccion-titulo {
        font-family: 'Space Grotesk', sans-serif;
        color: var(--text-white);
        padding-bottom: 18px;
        margin-top: 70px;
        text-transform: uppercase;
        font-size: 1.5rem;
        font-weight: 700;
        letter-spacing: 1px;
        position: relative;
    }

    h2.seccion-titulo::after {
        content: '';
        position: absolute;
        bottom: 0;
        left: 0;
        width: 60px;
        height: 3px;
        background: linear-gradient(90deg, var(--brand-accent), transparent);
        border-radius: var(--radius-pill);
    }
    /* --- RETÍCULAS DE EXHIBICIÓN EN TRES DIMENSIONES --- */
    .grid-productos {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(310px, 1fr));
        gap: 35px;
        margin-top: 35px;
    }

    #contenedor-combos {
        display: flex;
        flex-direction: column;
        gap: 40px;
        margin-top: 35px;
    }

    /* --- TARJETAS CRISTALINAS INDIVIDUALES (GLASSMOPHISM CLARO) --- */
    .tarjeta-producto {
        background: var(--glass-bg);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid var(--glass-border);
        border-radius: var(--radius-card);
        padding: 35px;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        box-shadow: var(--shadow-nebula);
        transition: var(--transition-fluid);
        position: relative;
        overflow: hidden;
    }

    /* Efecto de iluminación interna suave al pasar el mouse */
    .tarjeta-producto::before {
        content: '';
        position: absolute;
        inset: 0;
        border-radius: var(--radius-card);
        padding: 1px;
        background: linear-gradient(135deg, rgba(255,255,255,0.6), transparent 60%, rgba(179, 107, 40, 0.05));
        -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
        -webkit-mask-composite: xor;
        mask-composite: exclude;
        pointer-events: none;
        transition: var(--transition-fluid);
    }

    .tarjeta-producto:hover {
        transform: translateY(-8px);
        background: rgba(255, 255, 255, 0.95);
        border-color: rgba(179, 107, 40, 0.25);
        box-shadow: 0 20px 40px -15px rgba(9, 13, 22, 0.08);
    }

    .tarjeta-producto:hover::before {
        background: linear-gradient(135deg, rgba(179, 107, 40, 0.3), transparent 40%, rgba(255,255,255,0.5));
    }

    /* Insignia Elegante de Categorías */
    .tag-categoria {
        background: rgba(179, 107, 40, 0.08);
        color: var(--brand-accent);
        border: 1px solid rgba(179, 107, 40, 0.12);
        padding: 6px 16px;
        border-radius: var(--radius-pill);
        font-size: 0.72rem;
        font-weight: 700;
        margin-bottom: 24px;
        display: inline-block;
        align-self: flex-start;
        text-transform: uppercase;
        letter-spacing: 1px;
    }

    .tarjeta-producto h3 {
        color: var(--text-white);
        font-size: 1.35rem;
        font-weight: 700;
        margin: 0 0 12px 0;
        line-height: 1.3;
        letter-spacing: -0.3px;
    }

    .precio {
        font-size: 1.6rem;
        color: var(--brand-accent);
        font-weight: 700;
        margin: 20px 0;
        font-family: 'Space Grotesk', sans-serif;
    }

    /* --- CONFIGURADOR DE COMBOS PREMIUM --- */
    .tarjeta-combo-full {
        background: var(--glass-bg);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid var(--glass-border);
        border-radius: var(--radius-card);
        padding: 45px;
        width: 100%;
        box-sizing: border-box;
        box-shadow: var(--shadow-nebula);
        transition: var(--transition-fluid);
        position: relative;
    }

    .tarjeta-combo-full:hover {
        background: rgba(255, 255, 255, 0.95);
        border-color: rgba(179, 107, 40, 0.2);
        box-shadow: 0 20px 40px -15px rgba(9, 13, 22, 0.08);
    }

    .header-combo {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 35px;
        border-bottom: 1px dashed rgba(9, 13, 22, 0.1);
        padding-bottom: 24px;
    }

    .header-combo h3 {
        margin: 0;
        font-size: 1.75rem;
        color: var(--text-white);
        font-weight: 700;
        font-family: 'Space Grotesk', sans-serif;
        letter-spacing: -0.5px;
    }

    .header-combo .precio-combo {
        color: var(--brand-accent);
        font-size: 1.85rem;
        font-weight: 700;
        font-family: 'Space Grotesk', sans-serif;
    }

     /* --- OPTIMIZACIÓN DE ESPACIOS EN COMBOS --- */
    .config-box {
        background: rgba(9, 13, 22, 0.02);
        border: 1px solid rgba(9, 13, 22, 0.03);
        border-radius: var(--radius-interactive);
        padding: 16px 20px; /* Reducido a la mitad para dar más espacio */
        margin-bottom: 20px;
        display: flex !important;
        flex-direction: column !important;
        gap: 14px; /* Menos separación entre campos para compactar la caja */
    }

    .campo-grupo {
        width: 100% !important;
        margin: 0 !important; /* Eliminamos márgenes externos que encogen el select */
        padding: 0 !important;
    }

    .campo-grupo label {
        display: block;
        color: var(--text-gold);
        font-size: 0.75rem;
        font-weight: 700;
        text-transform: uppercase;
        margin-bottom: 6px; /* Menos espacio debajo de la etiqueta */
        letter-spacing: 1px;
    }

    /* --- SELECTORES MÁS GRANDES Y LIMPIOS --- */
    select {
        width: 100% !important;
        background-color: var(--bg-surface);
        color: var(--text-white);
        border: 1px solid var(--glass-border);
        
        /* Aumentamos el tamaño interno y de la letra */
        padding: 14px 18px !important; 
        font-size: 1.05rem !important; /* Texto notablemente más grande y legible */
        font-weight: 650 !important;
        
        border-radius: var(--radius-interactive);
        box-sizing: border-box !important;
        cursor: pointer;
        transition: var(--transition-fluid);
        appearance: none;
        
        /* Flecha del menú desplegable */
        background-image: url("data:image/svg+xml,%3Csvg xmlns='http://w3.org' viewBox='0 0 20 20' fill='%23b36b28'%3E%3Cpath fill-rule='evenodd' d='M5.22 8.22a.75.75 0 0 1 1.06 0L10 11.94l3.72-3.72a.75.75 0 1 1 1.06 1.06l-4.25 4.25a.75.75 0 0 1-1.06 0L5.22 9.28a.75.75 0 0 1 0-1.06z' clip-rule='evenodd' /%3E%3C/svg%3E");
        background-repeat: no-repeat;
        background-position: right 18px center;
        background-size: 22px;
        padding-right: 50px !important;
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.02);
    }

    select:focus {
        outline: none;
        border-color: var(--brand-accent);
        box-shadow: 0 0 0 4px rgba(179, 107, 40, 0.12);
    }


    /* --- CONTROLES SELECT ERGONÓMICOS Y CÓMODOS --- */
    select {
        width: 100%;
        background-color: var(--bg-surface);
        color: var(--text-white);
        border: 1px solid var(--glass-border);
        padding: 16px 20px;
        border-radius: var(--radius-interactive);
        font-size: 0.95rem;
        font-family: inherit;
        font-weight: 600;
        box-sizing: border-box;
        cursor: pointer;
        transition: var(--transition-fluid);
        appearance: none;
        /* Vector de flecha estilizada en tono canela */
        background-image: url("data:image/svg+xml,%3Csvg xmlns='http://w3.org' viewBox='0 0 20 20' fill='%23b36b28'%3E%3Cpath fill-rule='evenodd' d='M5.22 8.22a.75.75 0 0 1 1.06 0L10 11.94l3.72-3.72a.75.75 0 1 1 1.06 1.06l-4.25 4.25a.75.75 0 0 1-1.06 0L5.22 9.28a.75.75 0 0 1 0-1.06z' clip-rule='evenodd' /%3E%3C/svg%3E");
        background-repeat: no-repeat;
        background-position: right 20px center;
        background-size: 22px;
        padding-right: 54px;
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.02);
    }

    select:focus {
        outline: none;
        border-color: var(--brand-accent);
        box-shadow: 0 0 0 4px rgba(179, 107, 40, 0.12);
        background-color: var(--bg-surface);
    }
    /* --- BOTONES CON CONTRASTE CONMUTA INTERACTIVA --- */
    .btn-agregar-combo {
        background: var(--text-white);
        color: var(--bg-surface);
        border: none;
        padding: 18px 36px;
        border-radius: var(--radius-interactive);
        font-weight: 800;
        font-size: 0.85rem;
        text-transform: uppercase;
        letter-spacing: 1px;
        cursor: pointer;
        transition: var(--transition-fluid);
        float: right !important;
        margin-top: 5px !important;
        margin-bottom: 10px !important;
        box-shadow: 0 4px 12px rgba(15, 23, 42, 0.08);
    }

    .btn-agregar-combo:hover {
        background: var(--brand-accent);
        transform: translateY(-2px);
        box-shadow: 0 8px 20px rgba(179, 107, 40, 0.25);
    }

    .btn-agregar-combo:active {
        transform: translateY(-1px) scale(0.97);
    }

    .btn-agregar-individual {
        background: rgba(9, 13, 22, 0.04);
        color: var(--text-white);
        border: 1px solid var(--glass-border);
        padding: 18px;
        border-radius: var(--radius-interactive);
        font-weight: 700;
        cursor: pointer;
        width: 100%;
        margin-top: 22px;
        text-transform: uppercase;
        font-size: 0.8rem;
        letter-spacing: 1px;
        transition: var(--transition-fluid);
    }

    .btn-agregar-individual:hover {
        background: var(--brand-accent);
        color: var(--bg-surface);
        border-color: transparent;
        transform: translateY(-2px);
        box-shadow: 0 8px 20px rgba(179, 107, 40, 0.25);
    }

    .btn-agregar-individual:active {
        transform: translateY(-1px) scale(0.97);
    }

    /* --- PANEL DE ADQUISICIÓN LATERAL FIJO --- */
    aside.panel-pedido {
        width: 420px;
        background-color: var(--bg-surface);
        border-left: 1px solid var(--glass-border);
        padding: 45px 32px;
        position: sticky;
        top: 0;
        height: 100vh;
        box-sizing: border-box;
        display: flex;
        flex-direction: column;
        z-index: 100;
        box-shadow: -10px 0 40px rgba(9, 13, 22, 0.03);
    }

    .cabecera-pedido {
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 2px solid var(--bg-cosmico);
        padding-bottom: 26px;
        margin-bottom: 32px;
    }

    .cabecera-pedido h2 {
        margin: 0;
        font-size: 1.5rem;
        font-weight: 700;
        color: var(--text-white);
        font-family: 'Space Grotesk', sans-serif;
        letter-spacing: -0.5px;
    }

    .contador-badge {
        background-color: rgba(179, 107, 40, 0.08);
        color: var(--brand-accent);
        border: 1px solid rgba(179, 107, 40, 0.15);
        border-radius: 50px;
        padding: 4px 16px;
        font-weight: 700;
        font-size: 0.85rem;
        font-family: 'Space Grotesk', sans-serif;
    }

    .label-cliente {
        display: block;
        color: var(--text-muted);
        margin-bottom: 12px;
        font-size: 0.72rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 1px;
    }

    .input-nombre {
        width: 100%;
        padding: 18px 20px;
        border-radius: var(--radius-interactive);
        border: 1px solid var(--border-color, var(--glass-border));
        background-color: var(--bg-cosmico);
        color: var(--text-white);
        box-sizing: border-box;
        font-size: 1rem;
        font-family: inherit;
        font-weight: 600;
        transition: var(--transition-fluid);
    }

    .input-nombre:focus {
        outline: none;
        border-color: var(--brand-accent);
        background-color: var(--bg-surface);
        box-shadow: 0 0 0 4px rgba(179, 107, 40, 0.1);
    }

    .Carrito-elementos {
        flex: 1;
        overflow-y: auto;
        margin-top: 28px;
        padding-right: 8px;
    }

    .Carrito-elementos::-webkit-scrollbar {
        width: 4px;
    }
    .Carrito-elementos::-webkit-scrollbar-thumb {
        background-color: rgba(9, 13, 22, 0.08);
        border-radius: 10px;
    }

    /* --- TARJETAS INTERNAS DEL CARRITO --- */
    .item-carrito-fila {
        background: var(--bg-cosmico);
        padding: 24px;
        border-radius: var(--radius-interactive);
        margin-bottom: 20px;
        border: 1px solid var(--glass-border);
        box-sizing: border-box;
        transition: var(--transition-fluid);
    }

    .item-carrito-fila:hover {
        border-color: rgba(179, 107, 40, 0.15);
        background: rgba(179, 107, 40, 0.02);
    }

    .item-encabezado-flex {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 14px;
    }

    .item-titulo-carrito {
        margin: 0;
        font-weight: 700;
        font-size: 1rem;
        color: var(--text-white);
        line-height: 1.4;
    }

    .item-salsa-carrito {
        margin: 6px 0 0 0;
        color: var(--brand-accent);
        font-size: 0.8rem;
        font-weight: 700;
    }

    .item-desc-carrito {
        margin: 10px 0 0 0;
        color: var(--text-muted);
        font-size: 0.8rem;
        line-height: 1.5;
    }

    .item-precio-carrito {
        font-weight: 700;
        color: var(--brand-accent);
        font-size: 1.1rem;
        margin: 12px 0 0 0;
        font-family: 'Space Grotesk', sans-serif;
    }

    .input-nota-carrito {
        width: 100%;
        margin-top: 16px;
        padding: 12px 16px;
        border: 1px solid var(--glass-border);
        background-color: var(--bg-surface);
        border-radius: var(--radius-interactive);
        font-size: 0.8rem;
        box-sizing: border-box;
        color: var(--text-white);
        font-family: inherit;
        transition: var(--transition-fluid);
    }

    .input-nota-carrito:focus {
        outline: none;
        border-color: var(--brand-accent);
        box-shadow: 0 0 0 3px rgba(179, 107, 40, 0.06);
    }
    /* --- CONTROLES DE CANTIDAD CÓMODOS --- */
    .controles-contenedor {
        display: flex;
        align-items: center;
        gap: 14px;
        margin-top: 18px;
    }

    .item-botones-qty {
        display: flex;
        align-items: center;
        background-color: var(--bg-surface);
        border-radius: var(--radius-interactive);
        padding: 6px;
        border: 1px solid var(--glass-border);
        box-shadow: 0 1px 2px rgba(9, 13, 22, 0.02);
    }

    .item-botones-qty button {
        background: var(--bg-cosmico);
        color: var(--text-white);
        border: 1px solid var(--glass-border);
        width: 32px;
        height: 32px;
        border-radius: 8px;
        cursor: pointer;
        font-weight: 700;
        font-size: 1rem;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: var(--transition-fluid);
    }

    .item-botones-qty button:hover {
        background-color: var(--brand-accent);
        color: #ffffff;
        border-color: transparent;
    }

    .item-botones-qty button:active {
        transform: scale(0.85);
    }

    .item-botones-qty span {
        color: var(--text-white);
        font-size: 1rem;
        font-weight: 700;
        padding: 0 16px;
        min-width: 20px;
        text-align: center;
        font-family: 'Space Grotesk', sans-serif;
    }

    .btn-cancelar {
        background: var(--error-dim);
        border: 1px solid rgba(220, 38, 38, 0.15);
        color: var(--error-vibrant);
        font-size: 1.25rem;
        font-weight: 700;
        cursor: pointer;
        padding: 6px 14px;
        border-radius: var(--radius-interactive);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        transition: var(--transition-fluid);
    }

    .btn-cancelar:hover {
        background: var(--error-vibrant);
        color: #ffffff;
        border-color: transparent;
        box-shadow: 0 4px 12px rgba(220, 38, 38, 0.2);
    }

    /* --- PANEL DE TOTALES Y BOTÓN WHATSAPP ELEGANTE --- */
    aside.panel-pedido .Total {
        font-family: 'Space Grotesk', sans-serif;
        font-size: 1.5rem !important;
        font-weight: 700 !important;
        color: var(--text-white) !important;
        margin-top: 35px !important;
        border-top: 2px solid var(--bg-cosmico);
        padding-top: 26px;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    aside.panel-pedido #carrito-total {
        color: var(--brand-accent);
        font-weight: 700;
        font-size: 1.85rem;
    }

    aside.panel-pedido button.Boton-enviar {
        background: var(--text-white) !important;
        color: var(--bg-surface) !important;
        border: none !important;
        padding: 20px 32px !important;
        border-radius: var(--radius-interactive) !important;
        font-size: 1.05rem !important;
        font-weight: 800 !important;
        text-transform: uppercase;
        letter-spacing: 1px;
        cursor: pointer !important;
        width: 100% !important;
        margin-top: 30px !important;
        box-shadow: 0 8px 24px rgba(15, 23, 42, 0.12) !important;
        transition: var(--transition-fluid) !important;
        display: block !important;
    }

    aside.panel-pedido button.Boton-enviar:hover {
        background: var(--brand-accent) !important;
        color: #ffffff !important;
        box-shadow: 0 10px 28px rgba(179, 107, 40, 0.35) !important;
        transform: translateY(-3px);
    }

    aside.panel-pedido button.Boton-enviar:active {
        transform: translateY(-1px) scale(0.99) !important;
    }

    /* --- ADAPTACIÓN RESPONSIVE AUTOMÁTICA PARA MÓVILES --- */
    @media (max-width: 990px) {
        body {
            flex-direction: column !important;
        }

        #pantalla-tienda {
            flex-direction: column !important;
        }

        main {
            padding: 45px 24px !important;
            padding-bottom: 140px !important;
        }

        h1.logo {
            font-size: 3rem;
            margin-bottom: 40px;
        }

        /* Consola Flotante Inferior en Celulares */
        aside.panel-pedido {
            width: 100% !important;
            height: auto !important;
            max-height: 80px;
            position: fixed !important;
            bottom: 0 !important;
            left: 0 !important;
            right: 0 !important;
            border-left: none !important;
            border-top: 2px solid var(--brand-accent);
            background-color: #ffffff !important;
            padding: 20px 24px !important;
            box-shadow: 0 -10px 40px rgba(9, 13, 22, 0.08) !important;
            border-radius: var(--radius-card) var(--radius-card) 0 0 !important;
            overflow: hidden !important;

    <script>
        


  // ***** OBTENER LOS DATOS DEL ARCHIVO DE GOOGLE SHEETS *****
  const servidorGoogle = "https://docs.google.com/spreadsheets/d/";
  const idDocumento = "18DrAD8PX7jpvMoW9N8sKTlqXY4SiprjdmDMBKnfi8gQ";
  const endpointApi = "/gviz/tq?tqx=out:csv&sheet=Hoja1";
  const endpointConfig = "/gviz/tq?tqx=out:json&sheet=Configuracion";

  const urlGoogleSheets = servidorGoogle + idDocumento + endpointApi;

  let baseDatosProductos = { individuales: [], combos: [] };
  let carrito = [];
 
        async function cargarMenuCompleto() {
  const tienda = document.getElementById('pantalla-tienda');
  const contenedorMensaje = document.getElementById('mensaje-cerrado');
  const textoMensaje = document.getElementById('texto-mensaje');

  try {
    // === PASO 1: INTENTAR VERIFICAR EL HORARIO ===
    const urlConfigFinal = servidorGoogle + idDocumento + endpointConfig + "&t=" + new Date().getTime();
    const respuestaConfig = await fetch(urlConfigFinal, { cache: "no-store" });
    const textoConfig = await respuestaConfig.text();
    
    // Validar rigurosamente que Google Sheets responda con el formato JSON esperado
    if (textoConfig && textoConfig.includes("google.visualization.Query.setResponse")) {
      const datosJson = JSON.parse(textoConfig.substr(47).slice(0, -2));
      
      if (datosJson.table && datosJson.table.rows && datosJson.table.rows.length > 0) {
        const filaConfig = datosJson.table.rows[0].c;

        // Extraer celdas de configuración de la Fila 2
        const horaApertura = filaConfig[0] ? parseInt(filaConfig[0].v) : 12;
        const horaCierre = filaConfig[1] ? parseInt(filaConfig[1].v) : 22;
        const diasCerradoRaw = filaConfig[2] ? filaConfig[2].v.toString() : "";
        const mensajeCerrado = filaConfig[3] ? filaConfig[3].v : "Lo sentimos, está cerrado.";

        const diasCerrados = diasCerradoRaw.split(',').map(d => parseInt(d.trim())).filter(n => !isNaN(n));

        // Obtener tiempo actual en zona horaria local
        const ahora = new Date();
        const horaActual = parseInt(ahora.toLocaleString("es-MX", { hour: "2-digit", hour12: false, timeZone: "America/Mexico_City" }));
        const diaSemanaActual = ahora.toLocaleDateString("en-US", { weekday: "numeric", timeZone: "America/Mexico_City" });
        const diaActualNum = parseInt(diaSemanaActual) === 7 ? 0 : parseInt(diaSemanaActual);

        const estaCerradoPorDia = diasCerrados.includes(diaActualNum);
        const estaCerradoPorHora = (horaActual < horaApertura || horaActual >= horaCierre);

        if (estaCerradoPorDia || estaCerradoPorHora) {
          // Bloquear pantalla y desplegar mensaje de cerrado
          if (textoMensaje) textoMensaje.innerHTML = mensajeCerrado;
          if (tienda) tienda.style.display = 'none';
          if (contenedorMensaje) contenedorMensaje.style.display = 'block';
          return; // Detiene el flujo de forma segura
        }
      }
    }
  } catch (error) {
    console.error("Aviso: No se pudo validar el horario, aplicando modo seguro de apertura:", error);
  }

  // === PASO 2: MODO SEGURO / ABIERTO (Carga normal de platillos) ===
  // Si el negocio está abierto o si la API de configuración falla, se fuerza la visualización del menú
  if (tienda) tienda.style.display = 'flex';
  if (contenedorMensaje) contenedorMensaje.style.display = 'none';

  try {
    const urlFinal = urlGoogleSheets + "&t=" + new Date().getTime();
    const respuesta = await fetch(urlFinal, {
      cache: "no-store",
      headers: {
        'Cache-Control': 'no-cache',
        'Pragma': 'no-cache'
      }
    });

    const datosCsv = await respuesta.text();
    parsearEstructuraMenu(datosCsv);
  } catch (error) {
    console.error("Error crítico al descargar la lista de productos:", error);
  }
}

  



        function limpiarTextoSheets(celda) {
            if (!celda) return '';
            return celda.trim().replace(/^"|"$/g, '').trim();
}
        
        // === MOTOR DE PARSEO CORREGIDO CON INDEXACIÓN ESTRICTA ===
        function parsearEstructuraMenu(texto) {
            const lineas = texto.split('\n').map(l => l.trim()).filter(l => l.length > 0);
            const individuales = [];
            const combosAgrupados = {};
            let leyendoCombos = false;

            // Índices basados rigurosamente en tu captura de imagen real de Google Sheets
            const idxId = 0;   // Columna A (Id_platillo)
            const idxCat = 1;  // Columna B (Categoria)
            const idxNom = 2;  // Columna C (Producto)
            const idxPre = 3;  // Columna D (Precio)
            const idxDisp = 4; // Columna E (Disponible)
            const idxComboPaso = 5; // Columna F (Categoria de paso de combo)
            const idxComboProd = 6; // Columna G (Producto interno de combo)

            for (let i = 0; i < lineas.length; i++) {
                const linea = lineas[i];
                const columnas = linea.split(',').map(limpiarTextoSheets);

                if (!columnas || columnas[idxId] === 'Id_platillo' || columnas[idxId] === 'CONF') {
                    if (i > 1 && columnas[idxId] === 'Id_platillo') {
                        leyendoCombos = true;
                    }
                    continue;
                }

                const disponible = columnas[idxDisp] ? columnas[idxDisp].toLowerCase() === 'si' : false;
                if (!disponible) continue;

                // CORRECCIÓN CRÍTICA: Se evalúa el índice [0] del arreglo para evitar congelar el script
                if (columnas[idxId].startsWith('P') && !leyendoCombos) {
                    const producto = {
                        id: columnas[idxId],
                        categoria: columnas[idxCat],
                        nombre: columnas[idxNom],
                        precio: parseFloat(columnas[idxPre]) || 0,
                        salsas: []
                    };
                    
                    // Extraer salsas horizontales de la primera tabla
                    for (let s = 5; s < columnas.length; s++) {
                        if (columnas[s]) {
                            producto.salsas.push(columnas[s]);
                        }
                    }
                    individuales.push(producto);
                } 
                
                // CORRECCIÓN CRÍTICA: Se evalúa el índice [0] para agrupar los combos multi-opción
                if (columnas[idxId].startsWith('C')) {
                    const comboId = columnas[idxId];
                    const nombreCombo = columnas[idxNom]; 
                    const precioCombo = parseFloat(columnas[idxPre]) || 0; 
                    
                    const componenteCategoria = columnas[idxComboPaso]; 
                    const componenteProducto = columnas[idxComboProd];  
                    
                    const salsasComponente = [];
                    // Las salsas de los combos inician en la columna H (índice 7) en adelante
                    for (let s = 7; s < columnas.length; s++) {
                        if (columnas[s]) salsasComponente.push(columnas[s]);
                    }

                    if (!combosAgrupados[comboId]) {
                        combosAgrupados[comboId] = { id: comboId, nombre: nombreCombo, precio: precioCombo, secciones: {} };
                    }
                    if (!combosAgrupados[comboId].secciones[componenteCategoria]) {
                        combosAgrupados[comboId].secciones[componenteCategoria] = [];
                    }
                    combosAgrupados[comboId].secciones[componenteCategoria].push({ nombre: componenteProducto, salsas: salsasComponente });
                }
            }
            return { individuales, combos: Object.values(combosAgrupados) };
        }

        function renderizarArticulosIndividuales(productos) {
            const contenedor = document.getElementById('contenedor-individuales');
            if (!contenedor) return;
            contenedor.innerHTML = '';

            productos.forEach(prod => {
                let selectSalsas = '';
                if (prod.salsas.length > 0) {
                    selectSalsas = `
                        <select id="salsa-${prod.id}" style="margin-top:6px; padding: 4px; font-size:0.8rem;">
                            <option value="">-- Selecciona Salsa --</option>
                            ${prod.salsas.map(s => `<option value="${s}">${s}</option>`).join('')}
                        </select>`;
                }

                contenedor.innerHTML += `
                    <div class="tarjeta-producto">
                        <div>
                            <span class="tag-categoria">${prod.categoria}</span>
                            <h3 style="margin:4px 0; font-size:1rem;">${prod.nombre}</h3>
                            <p class="precio">$${prod.precio.toFixed(2)}</p>
                            ${selectSalsas}
                        </div>
                        <button class="btn-agregar-individual" onclick="agregarIndividualAlCarrito('${prod.id}')">Agregar +</button>
                    </div>`;
            });
        }

        function renderizarCombosDinamicos(combos) {
            const contenedor = document.getElementById('contenedor-combos');
            if (!contenedor) return;
            contenedor.innerHTML = '';

            combos.forEach(combo => {
                let htmlCampos = '';
                let indexPaso = 0;
                let referenciasAInicializar = [];

                for (const [nombreSeccion, opciones] of Object.entries(combo.secciones)) {
                    const idSelectProducto = `combo-${combo.id}-prod-${indexPaso}`;
                    const idSelectSalsa = `combo-${combo.id}-salsa-${indexPaso}`;        
                    
                    const esPlatilloPrincipal = nombreSeccion.toLowerCase().includes("platillo principal");
                    const esFijo = opciones.length === 1;

                    let htmlOpciones = opciones.map(opc => `<option value="${opc.nombre}">${opc.nombre}</option>`).join('');
                    let etiquetaLabel = `${nombreSeccion.toUpperCase()}:`;
                    if (esFijo && nombreSeccion.toLowerCase().includes("snack")) {
                        etiquetaLabel = `SNACK INCLUIDO (FIJO):`;
                    }

                    let bloqueSalsa = '';
                    if (esPlatilloPrincipal) {
                        const numeroSalsa = nombreSeccion.replace(/\D/g, ""); 
                        bloqueSalsa = `
                            <div class="campo-grupo" style="margin-top:6px;">
                                <label>SALSA ${numeroSalsa || 1}:</label>
                                <select id="${idSelectSalsa}" style="padding: 4px; font-size:0.8rem;">
                                    <option value="">-- Selecciona tu Salsa --</option>
                                </select>
                            </div>`;
                        
                        referenciasAInicializar.push({ idCombo: combo.id, nombreSeccion: nombreSeccion, idProd: idSelectProducto, idSalsa: idSelectSalsa });
                    }

                    htmlCampos += `
                        <div class="campo-grupo">
                            <label>${etiquetaLabel}</label>
                            <select id="${idSelectProducto}" onchange="actualizarSalsasEstructuraNueva('${combo.id}', '${nombreSeccion}', ${indexPaso})" style="padding: 4px; font-size:0.8rem;">
                                ${htmlOpciones}
                            </select>
                            ${bloqueSalsa}
                        </div>`;
                    
                    indexPaso++;
                }

                contenedor.innerHTML += `
                    <div class="tarjeta-combo-full">
                        <div class="header-combo">
                            <h3>${combo.nombre}</h3>
                            <span class="precio-combo">$${combo.precio.toFixed(2)}</span>
                        </div>
                        <div class="config-box">
                            <div style="color: #ff9f00; font-size: 0.75rem; font-weight: bold; text-transform: uppercase; margin-bottom: 12px;">⚙️ Configura tu ${combo.nombre.toLowerCase()}:</div>
                            ${htmlCampos}
                        </div>
                        <div style="overflow:hidden;">
                            <button class="btn-agregar-combo" onclick="agregarComboEstructuraNueva('${combo.id}')">Agregar +</button>
                        </div>
                    </div>`;

                setTimeout(() => {
                    referenciasAInicializar.forEach(ref => {
                        const pSel = document.getElementById(ref.idProd);
                        const sSel = document.getElementById(ref.idSalsa);
                        if (pSel && sSel) {
                            const productoSeleccionado = pSel.value;
                            const datosOpcion = combo.secciones[ref.nombreSeccion].find(o => o.nombre === productoSeleccionado);
                            if (datosOpcion && datosOpcion.salsas.length > 0) {
                                sSel.innerHTML = `<option value="">-- Selecciona tu Salsa --</option>` + 
                                    datosOpcion.salsas.map(s => `<option value="${s}">${s}</option>`).join('');
                            }
                        }
                    });
                }, 60);
            });
        }

        function actualizarSalsasEstructuraNueva(comboId, nombreSeccion, indexPaso) {
            const combo = baseDatosProductos.combos.find(c => c.id === comboId);
            const prodSelect = document.getElementById(`combo-${comboId}-prod-${indexPaso}`);
            const salsaSelect = document.getElementById(`combo-${comboId}-salsa-${indexPaso}`);
            if (!combo || !prodSelect || !salsaSelect) return;

            const productoSeleccionado = prodSelect.value;
            const datosOpcion = combo.secciones[nombreSeccion].find(o => o.nombre === productoSeleccionado);

            if (datosOpcion && datosOpcion.salsas.length > 0) {
                salsaSelect.innerHTML = `<option value="">-- Selecciona tu Salsa --</option>` + 
                    datosOpcion.salsas.map(s => `<option value="${s}">${s}</option>`).join('');
                salsaSelect.disabled = false;
            } else {
                salsaSelect.innerHTML = `<option value="">No requiere salsa</option>`;
                salsaSelect.disabled = true;
            }
        }

          function agregarIndividualAlCarrito(id) {
    const producto = baseDatosProductos.individuales.find(p => p.id === id);
    if (!producto) return;

    const selectSalsa = document.getElementById(`salsa-${id}`);
    const salsaSeleccionada = selectSalsa ? selectSalsa.value : '';

    if (producto.salsas.length > 0 && !salsaSeleccionada) {
        alert("Por favor selecciona una salsa para tus alitas o snacks.");
        return;
    }

    // ❌ SE ELIMINÓ: La validación 'itemExistente' que sumaba la cantidad.
    //  AHORA: Inserta siempre una línea nueva e independiente.
    carrito.push({ 
        uid: Date.now() + Math.random(), 
        id: producto.id, 
        nombre: producto.nombre, 
        precio: producto.precio, 
        salsa: salsaSeleccionada, 
        cantidad: 1, 
        nota: "" 
    });

    if (selectSalsa) selectSalsa.value = '';
    actualizarInterfazCarrito();
}

function agregarComboEstructuraNueva(comboId) {
    const combo = baseDatosProductos.combos.find(c => c.id === comboId);
    if (!combo) return;

    let configuracionFinal = [];
    let validacionCorrecta = true;

    let index = 0;
    for (const [nombreSeccion, opciones] of Object.entries(combo.secciones)) {
        const prodSelect = document.getElementById(`combo-${comboId}-prod-${index}`);
        const salsaSelect = document.getElementById(`combo-${comboId}-salsa-${index}`);

        const nombreArticulo = prodSelect ? prodSelect.value : '';
        const salsaArticulo = (salsaSelect && !salsaSelect.disabled) ? salsaSelect.value : '';

        if (!nombreArticulo) { validacionCorrecta = false; break; }

        if (salsaSelect && !salsaSelect.disabled && !salsaArticulo) {
            alert(`Por favor elige la salsa para tu ${nombreSeccion.toLowerCase()}: ${nombreArticulo}`);
            validacionCorrecta = false;
            break;
        }

        configuracionFinal.push(`${nombreArticulo}${salsaArticulo ? ` (🌶️ ${salsaArticulo})` : ''}`);
        index++;
    }

    if (!validacionCorrecta) return;

    const descripcionCombo = `[${configuracionFinal.join(' + ')}]`;

    // ❌ SE ELIMINÓ: La validación 'itemExistente' que agrupaba los combos idénticos.
    //  AHORA: Cada combo configurado va en su propio renglón.
    carrito.push({ 
        uid: Date.now() + Math.random(), 
        id: combo.id, 
        nombre: combo.nombre, 
        descripcion: descripcionCombo, 
        precio: combo.precio, 
        cantidad: 1, 
        nota: "" 
    });

    actualizarInterfazCarrito();
}

       function cambiarCantidad(uid, cambio) {
    const item = carrito.find(i => i.uid === uid);
    if (!item) return;

    // Si cambio es mayor que 0 (botón +), suma 0.5. Si es menor (botón -), resta 0.5.
    const ajusteDecimal = cambio > 0 ? 0.5 : -0.5;
    item.cantidad += ajusteDecimal;

    if (item.cantidad <= 0) {
        eliminarDelCarrito(uid);
    } else {
        actualizarInterfazCarrito();
    }
}

function eliminarDelCarrito(uid) {
    carrito = carrito.filter(item => item.uid !== uid);
    actualizarInterfazCarrito();
}

function actualizarNotaItem(uid, textoNota) {
    const item = carrito.find(i => i.uid === uid);
    if (item) item.nota = textoNota;
}

function actualizarInterfazCarrito() {
    const contenedorLista = document.getElementById('carrito-lista');
    const badgeContador = document.getElementById('badge-contador');
    const totalTexto = document.getElementById('carrito-total');

    let montoTotal = 0;
    let piezasTotales = 0;

    contenedorLista.innerHTML = '<p id="carrito-vacio-texto" style="color: #718096; text-align: center; margin-top: 20px; font-size: 0.75rem;">Carrito vacío.</p>';
    const txtRef = document.getElementById('carrito-vacio-texto');

    if (carrito.length > 0) {
        if (txtRef) txtRef.style.display = 'none';
        
        carrito.forEach((item) => {
            const subtotal = item.precio * item.cantidad;
            montoTotal += subtotal;
            piezasTotales += item.cantidad;

            const fila = document.createElement('div');
            fila.classList.add('item-carrito-fila');
            fila.innerHTML = `
                <div class="item-encabezado-flex">
                    <div>
                        <p class="item-titulo-carrito">${item.nombre}</p>
                        ${item.salsa ? `<p class="item-salsa-carrito">${item.salsa}</p>` : ''}
                        ${item.descripcion ? `<p class="item-desc-carrito">${item.descripcion}</p>` : ''}
                        <p class="item-precio-carrito">$${subtotal.toFixed(2)}</p>
                    </div>
                    <div class="controles-contenedor">
                        <div class="item-botones-qty">
                            <button onclick="cambiarCantidad(${item.uid}, -1)">-</button>
                            <span>${item.cantidad}</span>
                            <button onclick="cambiarCantidad(${item.uid}, 1)">+</button>
                        </div>
                        <button class="btn-cancelar" onclick="eliminarDelCarrito(${item.uid})">×</button>
                    </div>
                </div>
                <input type="text" class="input-nota-carrito" placeholder="Notas (salsa, aderezo...)" value="${item.nota}" oninput="actualizarNotaItem(${item.uid}, this.value)">
            `;
            contenedorLista.appendChild(fila);
        });
    }

    if (badgeContador) badgeContador.innerText = piezasTotales;
    if (totalTexto) totalTexto.innerText = `$${montoTotal.toFixed(2)}`;
}
        // === FUNCIÓN CORREGIDA: ENVÍA POR WHATSAPP Y LUEGO MUESTRA EL AGRADECIMIENTO ===
function despacharPedidoAWhatsApp() {
    const cliente = document.getElementById('nombre-cliente').value.trim();
    if (!cliente) { alert("Por favor escribe tu nombre."); return; }
    if (carrito.length === 0) { alert("Tu carrito está vacío."); return; }

    // =========================================================================
    // COLOCA AQUÍ TU TELÉFONO REAL DE ATENCIÓN (CON CLAVE DE PAÍS, SIN ESPACIOS NI SIGNOS +)
    // Ej: "521XXXXXXXXXX" (Si es México, pon 521 seguido de tus 10 dígitos)
    // =========================================================================
    //const miTelefonoSpaceWings = "521234567890"; 

    // Estructurar el texto que llegará a tu celular
    let msg = `🚀 *NUEVO PEDIDO - SPACE WINGS* 🚀\n\n`;
    msg += `👤 *Cliente:* ${cliente}\n`;
    msg += `-------------------------------------------\n`;

    let totalPedido = 0;
    carrito.forEach(item => {
        const sub = item.precio * item.cantidad;
        totalPedido += sub;
        msg += `📦 *${item.cantidad}x* ${item.nombre}\n`;
        if (item.salsa) msg += `   └ Salsa: ${item.salsa}\n`;
        if (item.descripcion) msg += `   └ ${item.descripcion}\n`;
        if (item.nota) msg += `   └ Nota: _${item.nota}_\n`;
        msg += `   └ Subtotal: $${sub.toFixed(2)}\n\n`;
    });

    msg += `-------------------------------------------\n`;
    msg += `💰 *TOTAL A PAGAR:* $${totalPedido.toFixed(2)}`;

    // 1. ABRIR EL CHAT DE WHATSAPP OFICIAL CON EL PEDIDO LISTO
   const urlApi = "https://wa.me/523411398581?text=" + encodeURIComponent(msg);
    window.open(urlApi, '_blank');

    // 2. INYECTAR DATOS EN LA INTERFAZ DE TU PÁGINA WEB
    document.getElementById('agradecimiento-cliente').innerText = cliente;
    document.getElementById('agradecimiento-total').innerText = `$${totalPedido.toFixed(2)}`;

    // 3. CAMBIAR DE PANTALLA EN TU SITIO WEB TRAS EL ENVÍO
    document.getElementById('pantalla-tienda').style.display = 'none';
    document.getElementById('pantalla-agradecimiento').style.display = 'block';

    // Limpiar carrito de compras local
    carrito = [];
    actualizarInterfazCarrito();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}


        function volverAlMenu() {
            document.getElementById('pantalla-agradecimiento').style.display = 'none';
            document.getElementById('pantalla-tienda').style.display = 'flex';
            document.getElementById('nombre-cliente').value = '';
        }

       document.addEventListener('DOMContentLoaded', () => {
    cargarMenuCompleto();
    
    const btnWhatsapp = document.getElementById('btn-whatsapp');
    if (btnWhatsapp) {
        btnWhatsapp.addEventListener('click', despacharPedidoAWhatsApp);
    }

    // LÓGICA MÓVIL: Abre/cierra el carrito al tocar la barra superior en celular
    const panelPedido = document.querySelector('aside.panel-pedido');
    const cabeceraPedido = document.querySelector('.cabecera-pedido') || document.querySelector('aside.panel-pedido h2');
    
    if (cabeceraPedido && panelPedido) {
        cabeceraPedido.addEventListener('click', () => {
            if (window.innerWidth <= 990) {
                panelPedido.classList.toggle('expandido');
            }
        });
    }
});

// Interceptores para abrir el carrito hacia arriba de forma automática al presionar "AGREGAR +"
const originalAgregarIndividual = agregarIndividualAlCarrito;
agregarIndividualAlCarrito = function(id) {
    originalAgregarIndividual(id);
    forzarAperturaCarritoMovil();
};

const originalAgregarCombo = agregarComboEstructuraNueva;
if (typeof agregarComboEstructuraNueva !== 'undefined') {
    agregarComboEstructuraNueva = function(comboId) {
        originalAgregarCombo(comboId);
        forzarAperturaCarritoMovil();
    };
}

function forzarAperturaCarritoMovil() {
    if (window.innerWidth <= 990) {
        const panel = document.querySelector('aside.panel-pedido');
        if (panel) panel.classList.add('expandido');
    }
}
