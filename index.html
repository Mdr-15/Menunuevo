<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Wings - Menú Digital</title>
    
    <!-- Fuentes tipográficas modernas y elegantes -->
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">

    <style>
    /* --- VARIABLES GLOBALES DE DISEÑO PREMIUM --- */
    :root {
        --bg-main: #f8fafc;        /* Fondo general ultra limpio */
        --bg-card: #ffffff;        /* Fondo de tarjetas y paneles */
        --brand-primary: #c27d38;   /* Café canela insignia de la marca */
        --brand-light: #fdf4eb;     /* Variación suave para fondos de acento */
        --brand-hover: #a8682a;     /* Café canela oscuro para interacciones */
        --text-dark: #0f172a;       /* Texto principal (Slate 900) */
        --text-muted: #64748b;      /* Texto secundario/notas (Slate 500) */
        --border-color: #e2e8f0;    /* Líneas de división sutiles (Slate 200) */
        --success: #10b981;         /* Verde para confirmaciones */
        --error: #ef4444;           /* Rojo para cancelaciones y alertas */
        --error-light: #fef2f2;     /* Fondo suave para botones de eliminar */
        --radius-lg: 20px;          /* Esquinas muy suaves para tarjetas */
        --radius-md: 12px;          /* Esquinas para elementos internos */
        --radius-sm: 8px;           /* Esquinas para botones pequeños y selectores */
        --shadow-sm: 0 4px 6px -1px rgba(15, 23, 42, 0.03), 0 2px 4px -2px rgba(15, 23, 42, 0.03);
        --shadow-md: 0 12px 25px -5px rgba(15, 23, 42, 0.06), 0 4px 12px -4px rgba(15, 23, 42, 0.04);
        --shadow-lg: 0 25px 50px -12px rgba(15, 23, 42, 0.08);
        --transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* --- ESTILOS BASE --- */
    body {
        background-color: var(--bg-main);
        color: var(--text-dark);
        font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
        margin: 0;
        display: flex;
        min-height: 100vh;
        -webkit-font-smoothing: antialiased;
    }

    #pantalla-tienda {
        display: flex;
        width: 100%;
    }

    main {
        flex: 1;
        padding: 50px 40px;
        box-sizing: border-box;
        max-width: 1200px;
        margin: 0 auto;
    }

    /* --- LOGOTIPO Y ENCABEZADOS --- */
    h1.logo {
        font-family: 'Space Grotesk', sans-serif;
        color: var(--brand-primary);
        font-size: 3rem;
        text-transform: uppercase;
        text-align: center;
        margin-bottom: 45px;
        font-weight: 700;
        letter-spacing: -1px;
    }

    h2.seccion-titulo {
        font-family: 'Space Grotesk', sans-serif;
        color: var(--text-dark);
        padding-bottom: 12px;
        margin-top: 50px;
        text-transform: uppercase;
        font-size: 1.4rem;
        font-weight: 700;
        letter-spacing: 0.5px;
        position: relative;
    }

    h2.seccion-titulo::after {
        content: '';
        position: absolute;
        bottom: 0;
        left: 0;
        width: 50px;
        height: 3px;
        background-color: var(--brand-primary);
        border-radius: 2px;
    }
    /* --- CONTENEDORES Y CUADRÍCULAS --- */
    .grid-productos {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
        gap: 28px;
        margin-top: 25px;
    }

    #contenedor-combos {
        display: flex;
        flex-direction: column;
        gap: 30px;
        margin-top: 25px;
    }

    /* --- TARJETAS DE PRODUCTOS INDIVIDUALES --- */
    .tarjeta-producto {
        background-color: var(--bg-card);
        border: 1px solid var(--border-color);
        border-radius: var(--radius-lg);
        padding: 28px;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        box-shadow: var(--shadow-sm);
        transition: var(--transition);
        position: relative;
        overflow: hidden;
    }

    .tarjeta-producto:hover {
        transform: translateY(-6px);
        box-shadow: var(--shadow-md);
        border-color: rgba(194, 125, 56, 0.3);
    }

    .tag-categoria {
        background-color: var(--brand-light);
        color: var(--brand-primary);
        padding: 6px 14px;
        border-radius: 50px;
        font-size: 0.75rem;
        font-weight: 700;
        margin-bottom: 16px;
        display: inline-block;
        align-self: flex-start;
        text-transform: uppercase;
        letter-spacing: 0.5px;
    }

    .tarjeta-producto h3 {
        color: var(--text-dark);
        font-weight: 700;
        margin: 8px 0;
    }

    .precio {
        font-size: 1.4rem;
        color: var(--brand-primary);
        font-weight: 800;
        margin: 14px 0;
        font-family: 'Space Grotesk', sans-serif;
    }

    /* --- CONFIGURADOR DE COMBOS ADVANCED --- */
    .tarjeta-combo-full {
        background-color: var(--bg-card);
        border: 1px solid var(--border-color);
        border-radius: var(--radius-lg);
        padding: 32px;
        width: 100%;
        box-sizing: border-box;
        box-shadow: var(--shadow-sm);
        transition: var(--transition);
    }

    .tarjeta-combo-full:hover {
        box-shadow: var(--shadow-md);
    }

    .header-combo {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 24px;
        border-bottom: 1px dashed var(--border-color);
        padding-bottom: 16px;
    }

    .header-combo h3 {
        margin: 0;
        font-size: 1.5rem;
        color: var(--text-dark);
        font-weight: 700;
        font-family: 'Space Grotesk', sans-serif;
    }

    .header-combo .precio-combo {
        color: var(--brand-primary);
        font-size: 1.6rem;
        font-weight: 800;
        font-family: 'Space Grotesk', sans-serif;
    }

    .config-box {
        background-color: var(--bg-main);
        border: 1px solid var(--border-color);
        border-radius: var(--radius-md);
        padding: 24px;
        margin-bottom: 20px;
        display: flex !important;
        flex-direction: column !important;
        gap: 18px;
    }

    .campo-grupo {
        margin-bottom: 0;
    }

    .campo-grupo label {
        display: block;
        color: var(--text-muted);
        font-size: 0.75rem;
        font-weight: 700;
        text-transform: uppercase;
        margin-bottom: 8px;
        letter-spacing: 0.8px;
    }

    /* --- FORMULARIOS Y SELECTORES MODERNOS --- */
    select {
        width: 100%;
        background-color: var(--bg-card);
        color: var(--text-dark);
        border: 1px solid var(--border-color);
        padding: 12px 16px;
        border-radius: var(--radius-sm);
        font-size: 0.9rem;
        font-family: inherit;
        font-weight: 500;
        box-sizing: border-box;
        cursor: pointer;
        transition: var(--transition);
        appearance: none;
        background-image: url("data:image/svg+xml,%3Csvg xmlns='http://w3.org' fill='none' viewBox='0 0 24 24' stroke='%2364748b' stroke-width='2'%3E%3Cpath stroke-linecap='round' stroke-linejoin='round' d='M19.5 8.25l-7.5 7.5-7.5-7.5'/%3E%3C/svg%3E");
        background-repeat: no-repeat;
        background-position: right 16px center;
        background-size: 16px;
        padding-right: 40px;
    }

    select:focus {
        outline: none;
        border-color: var(--brand-primary);
        box-shadow: 0 0 0 3px rgba(194, 125, 56, 0.15);
    }
    /* --- BOTONES MODERNOS --- */
    .btn-agregar-combo {
        background-color: var(--text-dark);
        color: #ffffff;
        border: none;
        padding: 14px 28px;
        border-radius: var(--radius-sm);
        font-weight: 700;
        font-size: 0.85rem;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        cursor: pointer;
        transition: var(--transition);
        float: right !important;
        margin-top: 5px !important;
        margin-bottom: 10px !important;
        box-shadow: var(--shadow-sm);
    }

    .btn-agregar-combo:hover {
        background-color: var(--brand-primary);
        transform: translateY(-1px);
        box-shadow: 0 4px 12px rgba(194, 125, 56, 0.2);
    }

    .btn-agregar-combo:active {
        transform: scale(0.98);
    }

    .btn-agregar-individual {
        background-color: var(--text-dark);
        color: #ffffff;
        border: none;
        padding: 14px;
        border-radius: var(--radius-sm);
        font-weight: 700;
        cursor: pointer;
        width: 100%;
        margin-top: 15px;
        text-transform: uppercase;
        font-size: 0.8rem;
        letter-spacing: 0.5px;
        transition: var(--transition);
    }

    .btn-agregar-individual:hover {
        background-color: var(--brand-primary);
        box-shadow: 0 4px 12px rgba(194, 125, 56, 0.2);
    }

    .btn-agregar-individual:active {
        transform: scale(0.98);
    }

    /* --- INTERFAZ LATERAL FIJA DEL PEDIDO --- */
    aside.panel-pedido {
        width: 380px;
        background-color: var(--bg-card);
        border-left: 1px solid var(--border-color);
        padding: 32px 24px;
        position: sticky;
        top: 0;
        height: 100vh;
        box-sizing: border-box;
        display: flex;
        flex-direction: column;
        z-index: 100;
        box-shadow: -10px 0 30px rgba(15, 23, 42, 0.02);
    }

    .cabecera-pedido {
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 2px solid var(--bg-main);
        padding-bottom: 20px;
        margin-bottom: 24px;
    }

    .cabecera-pedido h2 {
        margin: 0;
        font-size: 1.4rem;
        font-weight: 700;
        color: var(--text-dark);
        font-family: 'Space Grotesk', sans-serif;
    }

    .contador-badge {
        background-color: var(--brand-primary);
        color: #ffffff;
        border-radius: 50px;
        padding: 4px 12px;
        font-weight: 700;
        font-size: 0.85rem;
        font-family: 'Space Grotesk', sans-serif;
    }

    .label-cliente {
        display: block;
        color: var(--text-muted);
        margin-bottom: 8px;
        font-size: 0.75rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.8px;
    }

    .input-nombre {
        width: 100%;
        padding: 14px 16px;
        border-radius: var(--radius-sm);
        border: 1px solid var(--border-color);
        background-color: var(--bg-main);
        color: var(--text-dark);
        box-sizing: border-box;
        font-size: 0.95rem;
        font-family: inherit;
        font-weight: 500;
        transition: var(--transition);
    }

    .input-nombre:focus {
        outline: none;
        border-color: var(--brand-primary);
        background-color: var(--bg-card);
        box-shadow: 0 0 0 3px rgba(194, 125, 56, 0.15);
    }

    .Carrito-elementos {
        flex: 1;
        overflow-y: auto;
        margin-top: 20px;
        padding-right: 4px;
    }

    /* Estilización sutil de la barra de desplazamiento interna */
    .Carrito-elementos::-webkit-scrollbar {
        width: 6px;
    }
    .Carrito-elementos::-webkit-scrollbar-thumb {
        background-color: var(--border-color);
        border-radius: 10px;
    }

    /* --- FILAS DEL CARRITO --- */
    .item-carrito-fila {
        background-color: var(--bg-main);
        padding: 16px;
        border-radius: var(--radius-md);
        margin-bottom: 14px;
        border: 1px solid var(--border-color);
        box-sizing: border-box;
    }

    .item-encabezado-flex {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
    }

    .item-titulo-carrito {
        margin: 0;
        font-weight: 700;
        font-size: 0.95rem;
        color: var(--text-dark);
    }

    .item-salsa-carrito {
        margin: 4px 0 0 0;
        color: var(--brand-primary);
        font-size: 0.8rem;
        font-weight: 600;
    }

    .item-desc-carrito {
        margin: 6px 0 0 0;
        color: var(--text-muted);
        font-size: 0.75rem;
        line-height: 1.4;
    }

    .item-precio-carrito {
        font-weight: 700;
        color: var(--brand-primary);
        font-size: 0.95rem;
        margin: 8px 0 0 0;
        font-family: 'Space Grotesk', sans-serif;
    }

    .input-nota-carrito {
        width: 100%;
        margin-top: 12px;
        padding: 8px 12px;
        border: 1px solid var(--border-color);
        background-color: var(--bg-card);
        border-radius: var(--radius-sm);
        font-size: 0.75rem;
        box-sizing: border-box;
        color: var(--text-dark);
        font-family: inherit;
        transition: var(--transition);
    }

    .input-nota-carrito:focus {
        outline: none;
        border-color: var(--brand-primary);
    }
    /* --- CONTRELES DE CANTIDAD Y ACCIÓN --- */
    .controles-contenedor {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-top: 10px;
    }

    .item-botones-qty {
        display: flex;
        align-items: center;
        background-color: var(--bg-card);
        border-radius: var(--radius-sm);
        padding: 4px;
        border: 1px solid var(--border-color);
    }

    .item-botones-qty button {
        background: var(--bg-main);
        color: var(--text-dark);
        border: 1px solid var(--border-color);
        width: 26px;
        height: 26px;
        border-radius: 6px;
        cursor: pointer;
        font-weight: 700;
        font-size: 0.9rem;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: var(--transition);
    }

    .item-botones-qty button:hover {
        background-color: var(--brand-light);
        border-color: var(--brand-primary);
        color: var(--brand-primary);
    }

    .item-botones-qty button:active {
        transform: scale(0.9);
    }

    .item-botones-qty span {
        color: var(--text-dark);
        font-size: 0.85rem;
        font-weight: 700;
        padding: 0 12px;
        min-width: 16px;
        text-align: center;
    }

    .btn-cancelar {
        background: var(--error-light);
        border: 1px solid rgba(239, 68, 68, 0.15);
        color: var(--error);
        font-size: 1.1rem;
        font-weight: 700;
        cursor: pointer;
        padding: 4px 10px;
        border-radius: var(--radius-sm);
        display: flex;
        align-items: center;
        justify-content: center;
        transition: var(--transition);
    }

    .btn-cancelar:hover {
        background: var(--error);
        color: #ffffff;
        border-color: var(--error);
    }

    /* --- PANEL DE TOTALES Y BOTÓN WHATSAPP --- */
    aside.panel-pedido .Total {
        font-family: 'Space Grotesk', sans-serif;
        font-size: 1.3rem !important;
        font-weight: 700 !important;
        color: var(--text-dark) !important;
        margin-top: 24px !important;
        border-top: 2px solid var(--bg-main);
        padding-top: 18px;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    aside.panel-pedido #carrito-total {
        color: var(--brand-primary);
        font-weight: 800;
    }

    aside.panel-pedido button.Boton-enviar {
        background-color: var(--brand-primary) !important;
        color: #ffffff !important;
        border: none !important;
        padding: 16px 24px !important;
        border-radius: var(--radius-md) !important;
        font-size: 1rem !important;
        font-weight: 700 !important;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        cursor: pointer !important;
        width: 100% !important;
        margin-top: 20px !important;
        box-shadow: 0 4px 14px rgba(194, 125, 56, 0.3) !important;
        transition: var(--transition) !important;
        display: block !important;
    }

    aside.panel-pedido button.Boton-enviar:hover {
        background-color: var(--brand-hover) !important;
        box-shadow: 0 6px 20px rgba(194, 125, 56, 0.4) !important;
        transform: translateY(-1px);
    }

    aside.panel-pedido button.Boton-enviar:active {
        transform: scale(0.99) !important;
    }

    /* --- DISEÑO RESPONSIVO MÓVIL (CARRITO FLOTANTE COLAPSABLE) --- */
    @media (max-width: 990px) {
        body {
            flex-direction: column !important;
        }

        #pantalla-tienda {
            flex-direction: column !important;
        }

        main {
            padding: 30px 20px !important;
            padding-bottom: 100px !important;
        }

        h1.logo {
            font-size: 2.4rem;
            margin-bottom: 30px;
        }

        aside.panel-pedido {
            width: 100% !important;
            height: auto !important;
            max-height: 70px;
            position: fixed !important;
            bottom: 0 !important;
            left: 0 !important;
            right: 0 !important;
            border-left: none !important;
            border-top: 2px solid var(--brand-primary);
            background-color: var(--bg-card) !important;
            padding: 16px 24px !important;
            box-shadow: 0 -10px 40px rgba(15, 23, 42, 0.1) !important;
            border-radius: var(--radius-lg) var(--radius-lg) 0 0 !important;
            overflow: hidden !important;
            transition: max-height 0.4s cubic-bezier(0.25, 1, 0.5, 1) !important;
            z-index: 9999 !important;
        }

        aside.panel-pedido.expandido {
            max-height: 85vh !important;
            overflow-y: auto !important;
        }

        .cabecera-pedido {
            cursor: pointer !important;
            padding-bottom: 0 !important;
            margin-bottom: 0 !important;
            border-bottom: none !important;
            width: 100% !important;
        }

        aside.panel-pedido.expandido .cabecera-pedido {
            border-bottom: 2px solid var(--bg-main) !important;
            padding-bottom: 16px !important;
            margin-bottom: 20px !important;
        }

        .Carrito-elementos {
            max-height: 320px !important;
            margin-top: 20px !important;
        }

        aside.panel-pedido:not(.expandido) .label-cliente,
        aside.panel-pedido:not(.expandido) .input-nombre,
        aside.panel-pedido:not(.expandido) .Carrito-elementos,
        aside.panel-pedido:not(.expandido) button.Boton-enviar,
        aside.panel-pedido:not(.expandido) .item-carrito-fila,
        aside.panel-pedido:not(.expandido) div:has(> .input-nombre) {
            display: none !important;
        }

        aside.panel-pedido:not(.expandido) .Total {
            border-top: none !important;
            padding-top: 0 !important;
            margin-top: 0 !important;
            font-size: 1.1rem !important;
        }

        /* Indicadores interactivos del estado del carrito en móvil */
        .cabecera-pedido::after {
            content: '🔼 Ver pedido';
            color: var(--brand-primary);
            font-size: 0.8rem;
            font-weight: 700;
            background-color: var(--brand-light);
            padding: 8px 16px;
            border-radius: 50px;
            transition: var(--transition);
        }

        aside.panel-pedido.expandido .cabecera-pedido::after {
            content: '🔽 Ocultar';
            background-color: var(--bg-main);
            color: var(--text-muted);
        }
    }
    </style>

  
</head>
<body>

    <!-- CONTENEDOR PRINCIPAL DE LA TIENDA -->
    <div id="pantalla-tienda">
        <main>
            <h1 class="logo">Space Wings</h1>
            <h2 class="seccion-titulo">Nuestras Especialidades</h2>
            <div id="contenedor-individuales" class="grid-productos"></div>
            <h2 class="seccion-titulo">Combos Space Wings</h2>
            <div id="contenedor-combos"></div>
        </main>

        <aside class="panel-pedido">
            <div class="cabecera-pedido"><h2>🛒 Pedido</h2><div class="contador-badge" id="badge-contador">0</div></div>
            <div style="margin-top: 5px;"><label class="label-cliente">Cliente *</label><input type="text" id="nombre-cliente" class="input-nombre" placeholder="Ingresa tu nombre"></div>
            <div class="Carrito-elementos" id="carrito-lista"><p id="carrito-vacio-texto" style="color: #718096; text-align: center; margin-top: 15px; font-size: 0.75rem;">Carrito vacío.</p></div>
            <div class="Total"><span>Total:</span><span id="carrito-total">$0.00</span></div>
            <button class="Boton-enviar" id="btn-whatsapp">Enviar Pedido</button>
        </aside>
    </div>

    <!-- SECCIÓN INTERACTIVA DE AGRADECIMIENTO -->
    <div id="pantalla-agradecimiento" style="display: none; text-align: center; padding: 40px 20px; background-color: #161a1f; border-radius: 12px; max-width: 450px; margin: 40px auto; border: 1px solid #232931; box-sizing: border-box;">
        <span style="font-size: 3.5rem;">🚀</span>
        <h2 style="color: #ff9f00; text-transform: uppercase; margin-top: 10px; font-size: 1.4rem;">¡Pedido Confirmado!</h2>
        <p style="font-size: 1rem; color: #ffffff; margin-bottom: 5px;">Muchas gracias por tu compra, <strong id="agradecimiento-cliente" style="color: #ff9f00;"></strong>.</p>
        <p style="color: #a0aec0; font-size: 0.85rem; margin-top: 0;">Tu orden está siendo procesada en la estación de control.</p>
        <div style="background-color: #0d0f12; padding: 12px; border-radius: 8px; margin: 15px 0; border: 1px solid #232931;">
            <span style="color: #a0aec0; font-size: 0.75rem; font-weight: bold; text-transform: uppercase;">Total a pagar:</span>
            <div id="agradecimiento-total" style="font-size: 1.6rem; color: #ff9f00; font-weight: bold; margin-top: 3px;">$0.00</div>
        </div>
        <button onclick="volverAlMenu()" style="background-color: #ff9f00; color: #0d0f12; border: none; padding: 10px 20px; border-radius: 6px; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 0.85rem; width: 100%;">Volver al Menú</button>
    </div>

    <script>
        

        //***** OBTENER LOS DATOS DEL ARCHIVO DE GOOGLE SHEETS
        
const servidorGoogle = "https://docs.google.com/spreadsheets/d/";
const idDocumento = "18DrAD8PX7jpvMoW9N8sKTlqXY4SiprjdmDMBKnfi8gQ";
const endpointApi = "/gviz/tq?tqx=out:csv&sheet=Hoja1";

const urlGoogleSheets = servidorGoogle + idDocumento + endpointApi;

let baseDatosProductos = { individuales: [], combos: [] };
let carrito = [];

async function cargarMenuCompleto() {
    try {
        // Rompemos la caché de Google agregando la hora actual exacta
        const urlFinal = urlGoogleSheets + "&t=" + new Date().getTime();

        const respuesta = await fetch(urlFinal, { 
            cache: "no-store",
            headers: {
                'Cache-Control': 'no-cache',
                'Pragma': 'no-cache'
            }
        });

        const textoCSV = await respuesta.text();
        baseDatosProductos = parsearEstructuraMenu(textoCSV);
        
        renderizarArticulosIndividuales(baseDatosProductos.individuales);
        renderizarCombosDinamicos(baseDatosProductos.combos);
        actualizarInterfazCarrito();
        console.log("⚡ Menú en vivo actualizado con éxito.");
    } catch (error) {
        console.error("Fallo al inicializar base de datos:", error);
    }
}

        function limpiarTextoSheets(celda) {
            if (!celda) return '';
            return celda.trim().replace(/^"|"$/g, '').trim();
}
        
        // === MOTOR DE PARSEO CORREGIDO CON INDEXACIÓN ESTRICTA ===
        function parsearEstructuraMenu(texto) {
            const lineas = texto.split('\n').map(l => l.trim()).filter(l => l.length > 0);
            const individuales = [];
            const combosAgrupados = {};
            let leyendoCombos = false;

            // Índices basados rigurosamente en tu captura de imagen real de Google Sheets
            const idxId = 0;   // Columna A (Id_platillo)
            const idxCat = 1;  // Columna B (Categoria)
            const idxNom = 2;  // Columna C (Producto)
            const idxPre = 3;  // Columna D (Precio)
            const idxDisp = 4; // Columna E (Disponible)
            const idxComboPaso = 5; // Columna F (Categoria de paso de combo)
            const idxComboProd = 6; // Columna G (Producto interno de combo)

            for (let i = 0; i < lineas.length; i++) {
                const linea = lineas[i];
                const columnas = linea.split(',').map(limpiarTextoSheets);

                if (!columnas || columnas[idxId] === 'Id_platillo' || columnas[idxId] === 'CONF') {
                    if (i > 1 && columnas[idxId] === 'Id_platillo') {
                        leyendoCombos = true;
                    }
                    continue;
                }

                const disponible = columnas[idxDisp] ? columnas[idxDisp].toLowerCase() === 'si' : false;
                if (!disponible) continue;

                // CORRECCIÓN CRÍTICA: Se evalúa el índice [0] del arreglo para evitar congelar el script
                if (columnas[idxId].startsWith('P') && !leyendoCombos) {
                    const producto = {
                        id: columnas[idxId],
                        categoria: columnas[idxCat],
                        nombre: columnas[idxNom],
                        precio: parseFloat(columnas[idxPre]) || 0,
                        salsas: []
                    };
                    
                    // Extraer salsas horizontales de la primera tabla
                    for (let s = 5; s < columnas.length; s++) {
                        if (columnas[s]) {
                            producto.salsas.push(columnas[s]);
                        }
                    }
                    individuales.push(producto);
                } 
                
                // CORRECCIÓN CRÍTICA: Se evalúa el índice [0] para agrupar los combos multi-opción
                if (columnas[idxId].startsWith('C')) {
                    const comboId = columnas[idxId];
                    const nombreCombo = columnas[idxNom]; 
                    const precioCombo = parseFloat(columnas[idxPre]) || 0; 
                    
                    const componenteCategoria = columnas[idxComboPaso]; 
                    const componenteProducto = columnas[idxComboProd];  
                    
                    const salsasComponente = [];
                    // Las salsas de los combos inician en la columna H (índice 7) en adelante
                    for (let s = 7; s < columnas.length; s++) {
                        if (columnas[s]) salsasComponente.push(columnas[s]);
                    }

                    if (!combosAgrupados[comboId]) {
                        combosAgrupados[comboId] = { id: comboId, nombre: nombreCombo, precio: precioCombo, secciones: {} };
                    }
                    if (!combosAgrupados[comboId].secciones[componenteCategoria]) {
                        combosAgrupados[comboId].secciones[componenteCategoria] = [];
                    }
                    combosAgrupados[comboId].secciones[componenteCategoria].push({ nombre: componenteProducto, salsas: salsasComponente });
                }
            }
            return { individuales, combos: Object.values(combosAgrupados) };
        }

        function renderizarArticulosIndividuales(productos) {
            const contenedor = document.getElementById('contenedor-individuales');
            if (!contenedor) return;
            contenedor.innerHTML = '';

            productos.forEach(prod => {
                let selectSalsas = '';
                if (prod.salsas.length > 0) {
                    selectSalsas = `
                        <select id="salsa-${prod.id}" style="margin-top:6px; padding: 4px; font-size:0.8rem;">
                            <option value="">-- Selecciona Salsa --</option>
                            ${prod.salsas.map(s => `<option value="${s}">${s}</option>`).join('')}
                        </select>`;
                }

                contenedor.innerHTML += `
                    <div class="tarjeta-producto">
                        <div>
                            <span class="tag-categoria">${prod.categoria}</span>
                            <h3 style="margin:4px 0; font-size:1rem;">${prod.nombre}</h3>
                            <p class="precio">$${prod.precio.toFixed(2)}</p>
                            ${selectSalsas}
                        </div>
                        <button class="btn-agregar-individual" onclick="agregarIndividualAlCarrito('${prod.id}')">Agregar +</button>
                    </div>`;
            });
        }

        function renderizarCombosDinamicos(combos) {
            const contenedor = document.getElementById('contenedor-combos');
            if (!contenedor) return;
            contenedor.innerHTML = '';

            combos.forEach(combo => {
                let htmlCampos = '';
                let indexPaso = 0;
                let referenciasAInicializar = [];

                for (const [nombreSeccion, opciones] of Object.entries(combo.secciones)) {
                    const idSelectProducto = `combo-${combo.id}-prod-${indexPaso}`;
                    const idSelectSalsa = `combo-${combo.id}-salsa-${indexPaso}`;        
                    
                    const esPlatilloPrincipal = nombreSeccion.toLowerCase().includes("platillo principal");
                    const esFijo = opciones.length === 1;

                    let htmlOpciones = opciones.map(opc => `<option value="${opc.nombre}">${opc.nombre}</option>`).join('');
                    let etiquetaLabel = `${nombreSeccion.toUpperCase()}:`;
                    if (esFijo && nombreSeccion.toLowerCase().includes("snack")) {
                        etiquetaLabel = `SNACK INCLUIDO (FIJO):`;
                    }

                    let bloqueSalsa = '';
                    if (esPlatilloPrincipal) {
                        const numeroSalsa = nombreSeccion.replace(/\D/g, ""); 
                        bloqueSalsa = `
                            <div class="campo-grupo" style="margin-top:6px;">
                                <label>SALSA ${numeroSalsa || 1}:</label>
                                <select id="${idSelectSalsa}" style="padding: 4px; font-size:0.8rem;">
                                    <option value="">-- Selecciona tu Salsa --</option>
                                </select>
                            </div>`;
                        
                        referenciasAInicializar.push({ idCombo: combo.id, nombreSeccion: nombreSeccion, idProd: idSelectProducto, idSalsa: idSelectSalsa });
                    }

                    htmlCampos += `
                        <div class="campo-grupo">
                            <label>${etiquetaLabel}</label>
                            <select id="${idSelectProducto}" onchange="actualizarSalsasEstructuraNueva('${combo.id}', '${nombreSeccion}', ${indexPaso})" style="padding: 4px; font-size:0.8rem;">
                                ${htmlOpciones}
                            </select>
                            ${bloqueSalsa}
                        </div>`;
                    
                    indexPaso++;
                }

                contenedor.innerHTML += `
                    <div class="tarjeta-combo-full">
                        <div class="header-combo">
                            <h3>${combo.nombre}</h3>
                            <span class="precio-combo">$${combo.precio.toFixed(2)}</span>
                        </div>
                        <div class="config-box">
                            <div style="color: #ff9f00; font-size: 0.75rem; font-weight: bold; text-transform: uppercase; margin-bottom: 12px;">⚙️ Configura tu ${combo.nombre.toLowerCase()}:</div>
                            ${htmlCampos}
                        </div>
                        <div style="overflow:hidden;">
                            <button class="btn-agregar-combo" onclick="agregarComboEstructuraNueva('${combo.id}')">Agregar +</button>
                        </div>
                    </div>`;

                setTimeout(() => {
                    referenciasAInicializar.forEach(ref => {
                        const pSel = document.getElementById(ref.idProd);
                        const sSel = document.getElementById(ref.idSalsa);
                        if (pSel && sSel) {
                            const productoSeleccionado = pSel.value;
                            const datosOpcion = combo.secciones[ref.nombreSeccion].find(o => o.nombre === productoSeleccionado);
                            if (datosOpcion && datosOpcion.salsas.length > 0) {
                                sSel.innerHTML = `<option value="">-- Selecciona tu Salsa --</option>` + 
                                    datosOpcion.salsas.map(s => `<option value="${s}">${s}</option>`).join('');
                            }
                        }
                    });
                }, 60);
            });
        }

        function actualizarSalsasEstructuraNueva(comboId, nombreSeccion, indexPaso) {
            const combo = baseDatosProductos.combos.find(c => c.id === comboId);
            const prodSelect = document.getElementById(`combo-${comboId}-prod-${indexPaso}`);
            const salsaSelect = document.getElementById(`combo-${comboId}-salsa-${indexPaso}`);
            if (!combo || !prodSelect || !salsaSelect) return;

            const productoSeleccionado = prodSelect.value;
            const datosOpcion = combo.secciones[nombreSeccion].find(o => o.nombre === productoSeleccionado);

            if (datosOpcion && datosOpcion.salsas.length > 0) {
                salsaSelect.innerHTML = `<option value="">-- Selecciona tu Salsa --</option>` + 
                    datosOpcion.salsas.map(s => `<option value="${s}">${s}</option>`).join('');
                salsaSelect.disabled = false;
            } else {
                salsaSelect.innerHTML = `<option value="">No requiere salsa</option>`;
                salsaSelect.disabled = true;
            }
        }

          function agregarIndividualAlCarrito(id) {
    const producto = baseDatosProductos.individuales.find(p => p.id === id);
    if (!producto) return;

    const selectSalsa = document.getElementById(`salsa-${id}`);
    const salsaSeleccionada = selectSalsa ? selectSalsa.value : '';

    if (producto.salsas.length > 0 && !salsaSeleccionada) {
        alert("Por favor selecciona una salsa para tus alitas o snacks.");
        return;
    }

    // ❌ SE ELIMINÓ: La validación 'itemExistente' que sumaba la cantidad.
    //  AHORA: Inserta siempre una línea nueva e independiente.
    carrito.push({ 
        uid: Date.now() + Math.random(), 
        id: producto.id, 
        nombre: producto.nombre, 
        precio: producto.precio, 
        salsa: salsaSeleccionada, 
        cantidad: 1, 
        nota: "" 
    });

    if (selectSalsa) selectSalsa.value = '';
    actualizarInterfazCarrito();
}

function agregarComboEstructuraNueva(comboId) {
    const combo = baseDatosProductos.combos.find(c => c.id === comboId);
    if (!combo) return;

    let configuracionFinal = [];
    let validacionCorrecta = true;

    let index = 0;
    for (const [nombreSeccion, opciones] of Object.entries(combo.secciones)) {
        const prodSelect = document.getElementById(`combo-${comboId}-prod-${index}`);
        const salsaSelect = document.getElementById(`combo-${comboId}-salsa-${index}`);

        const nombreArticulo = prodSelect ? prodSelect.value : '';
        const salsaArticulo = (salsaSelect && !salsaSelect.disabled) ? salsaSelect.value : '';

        if (!nombreArticulo) { validacionCorrecta = false; break; }

        if (salsaSelect && !salsaSelect.disabled && !salsaArticulo) {
            alert(`Por favor elige la salsa para tu ${nombreSeccion.toLowerCase()}: ${nombreArticulo}`);
            validacionCorrecta = false;
            break;
        }

        configuracionFinal.push(`${nombreArticulo}${salsaArticulo ? ` (🌶️ ${salsaArticulo})` : ''}`);
        index++;
    }

    if (!validacionCorrecta) return;

    const descripcionCombo = `[${configuracionFinal.join(' + ')}]`;

    // ❌ SE ELIMINÓ: La validación 'itemExistente' que agrupaba los combos idénticos.
    //  AHORA: Cada combo configurado va en su propio renglón.
    carrito.push({ 
        uid: Date.now() + Math.random(), 
        id: combo.id, 
        nombre: combo.nombre, 
        descripcion: descripcionCombo, 
        precio: combo.precio, 
        cantidad: 1, 
        nota: "" 
    });

    actualizarInterfazCarrito();
}

       function cambiarCantidad(uid, cambio) {
    const item = carrito.find(i => i.uid === uid);
    if (!item) return;

    // Si cambio es mayor que 0 (botón +), suma 0.5. Si es menor (botón -), resta 0.5.
    const ajusteDecimal = cambio > 0 ? 0.5 : -0.5;
    item.cantidad += ajusteDecimal;

    if (item.cantidad <= 0) {
        eliminarDelCarrito(uid);
    } else {
        actualizarInterfazCarrito();
    }
}

function eliminarDelCarrito(uid) {
    carrito = carrito.filter(item => item.uid !== uid);
    actualizarInterfazCarrito();
}

function actualizarNotaItem(uid, textoNota) {
    const item = carrito.find(i => i.uid === uid);
    if (item) item.nota = textoNota;
}

function actualizarInterfazCarrito() {
    const contenedorLista = document.getElementById('carrito-lista');
    const badgeContador = document.getElementById('badge-contador');
    const totalTexto = document.getElementById('carrito-total');

    let montoTotal = 0;
    let piezasTotales = 0;

    contenedorLista.innerHTML = '<p id="carrito-vacio-texto" style="color: #718096; text-align: center; margin-top: 20px; font-size: 0.75rem;">Carrito vacío.</p>';
    const txtRef = document.getElementById('carrito-vacio-texto');

    if (carrito.length > 0) {
        if (txtRef) txtRef.style.display = 'none';
        
        carrito.forEach((item) => {
            const subtotal = item.precio * item.cantidad;
            montoTotal += subtotal;
            piezasTotales += item.cantidad;

            const fila = document.createElement('div');
            fila.classList.add('item-carrito-fila');
            fila.innerHTML = `
                <div class="item-encabezado-flex">
                    <div>
                        <p class="item-titulo-carrito">${item.nombre}</p>
                        ${item.salsa ? `<p class="item-salsa-carrito">${item.salsa}</p>` : ''}
                        ${item.descripcion ? `<p class="item-desc-carrito">${item.descripcion}</p>` : ''}
                        <p class="item-precio-carrito">$${subtotal.toFixed(2)}</p>
                    </div>
                    <div class="controles-contenedor">
                        <div class="item-botones-qty">
                            <button onclick="cambiarCantidad(${item.uid}, -1)">-</button>
                            <span>${item.cantidad}</span>
                            <button onclick="cambiarCantidad(${item.uid}, 1)">+</button>
                        </div>
                        <button class="btn-cancelar" onclick="eliminarDelCarrito(${item.uid})">×</button>
                    </div>
                </div>
                <input type="text" class="input-nota-carrito" placeholder="Notas (salsa, aderezo...)" value="${item.nota}" oninput="actualizarNotaItem(${item.uid}, this.value)">
            `;
            contenedorLista.appendChild(fila);
        });
    }

    if (badgeContador) badgeContador.innerText = piezasTotales;
    if (totalTexto) totalTexto.innerText = `$${montoTotal.toFixed(2)}`;
}
        // === FUNCIÓN CORREGIDA: ENVÍA POR WHATSAPP Y LUEGO MUESTRA EL AGRADECIMIENTO ===
function despacharPedidoAWhatsApp() {
    const cliente = document.getElementById('nombre-cliente').value.trim();
    if (!cliente) { alert("Por favor escribe tu nombre."); return; }
    if (carrito.length === 0) { alert("Tu carrito está vacío."); return; }

    // =========================================================================
    // COLOCA AQUÍ TU TELÉFONO REAL DE ATENCIÓN (CON CLAVE DE PAÍS, SIN ESPACIOS NI SIGNOS +)
    // Ej: "521XXXXXXXXXX" (Si es México, pon 521 seguido de tus 10 dígitos)
    // =========================================================================
    //const miTelefonoSpaceWings = "521234567890"; 

    // Estructurar el texto que llegará a tu celular
    let msg = `🚀 *NUEVO PEDIDO - SPACE WINGS* 🚀\n\n`;
    msg += `👤 *Cliente:* ${cliente}\n`;
    msg += `-------------------------------------------\n`;

    let totalPedido = 0;
    carrito.forEach(item => {
        const sub = item.precio * item.cantidad;
        totalPedido += sub;
        msg += `📦 *${item.cantidad}x* ${item.nombre}\n`;
        if (item.salsa) msg += `   └ Salsa: ${item.salsa}\n`;
        if (item.descripcion) msg += `   └ ${item.descripcion}\n`;
        if (item.nota) msg += `   └ Nota: _${item.nota}_\n`;
        msg += `   └ Subtotal: $${sub.toFixed(2)}\n\n`;
    });

    msg += `-------------------------------------------\n`;
    msg += `💰 *TOTAL A PAGAR:* $${totalPedido.toFixed(2)}`;

    // 1. ABRIR EL CHAT DE WHATSAPP OFICIAL CON EL PEDIDO LISTO
   const urlApi = "https://wa.me/523411398581?text=" + encodeURIComponent(msg);
    window.open(urlApi, '_blank');

    // 2. INYECTAR DATOS EN LA INTERFAZ DE TU PÁGINA WEB
    document.getElementById('agradecimiento-cliente').innerText = cliente;
    document.getElementById('agradecimiento-total').innerText = `$${totalPedido.toFixed(2)}`;

    // 3. CAMBIAR DE PANTALLA EN TU SITIO WEB TRAS EL ENVÍO
    document.getElementById('pantalla-tienda').style.display = 'none';
    document.getElementById('pantalla-agradecimiento').style.display = 'block';

    // Limpiar carrito de compras local
    carrito = [];
    actualizarInterfazCarrito();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}


        function volverAlMenu() {
            document.getElementById('pantalla-agradecimiento').style.display = 'none';
            document.getElementById('pantalla-tienda').style.display = 'flex';
            document.getElementById('nombre-cliente').value = '';
        }

       document.addEventListener('DOMContentLoaded', () => {
    cargarMenuCompleto();
    
    const btnWhatsapp = document.getElementById('btn-whatsapp');
    if (btnWhatsapp) {
        btnWhatsapp.addEventListener('click', despacharPedidoAWhatsApp);
    }

    // LÓGICA MÓVIL: Abre/cierra el carrito al tocar la barra superior en celular
    const panelPedido = document.querySelector('aside.panel-pedido');
    const cabeceraPedido = document.querySelector('.cabecera-pedido') || document.querySelector('aside.panel-pedido h2');
    
    if (cabeceraPedido && panelPedido) {
        cabeceraPedido.addEventListener('click', () => {
            if (window.innerWidth <= 990) {
                panelPedido.classList.toggle('expandido');
            }
        });
    }
});

// Interceptores para abrir el carrito hacia arriba de forma automática al presionar "AGREGAR +"
const originalAgregarIndividual = agregarIndividualAlCarrito;
agregarIndividualAlCarrito = function(id) {
    originalAgregarIndividual(id);
    forzarAperturaCarritoMovil();
};

const originalAgregarCombo = agregarComboEstructuraNueva;
if (typeof agregarComboEstructuraNueva !== 'undefined') {
    agregarComboEstructuraNueva = function(comboId) {
        originalAgregarCombo(comboId);
        forzarAperturaCarritoMovil();
    };
}

function forzarAperturaCarritoMovil() {
    if (window.innerWidth <= 990) {
        const panel = document.querySelector('aside.panel-pedido');
        if (panel) panel.classList.add('expandido');
    }
}
